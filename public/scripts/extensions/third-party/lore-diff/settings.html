<div id="lorediff_settings">
  <div class="inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
      <div class="flex-container alignitemscenter margin0">
        <b>LoreDiff</b>
      </div>
      <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
    </div>

    <div class="inline-drawer-content">
      <div class="flex-container flexGap10 alignItemsCenter">
        <label for="lorediff_request_mode" style="min-width: 180px;">Generation mode</label>
        <select id="lorediff_request_mode">
          <option value="st">SillyTavern (Connection Manager)</option>
          <option value="external">External API (OpenAI-compatible)</option>
        </select>
      </div>

      <div class="flex-container flexGap10 alignItemsCenter">
        <label for="lorediff_profile_mode" style="min-width: 180px;">Analysis connection</label>
        <select id="lorediff_profile_mode">
          <option value="same">Same as chat</option>
          <option value="profile">Connection Manager profile</option>
        </select>
      </div>

      <div class="flex-container flexGap10 alignItemsCenter" id="lorediff_profile_row">
        <label for="lorediff_profile_id" style="min-width: 180px;">Analysis profile</label>
        <select id="lorediff_profile_id"></select>
      </div>

      <div id="lorediff_external_block" class="hidden">
        <div class="flex-container flexGap10 alignItemsCenter">
          <label for="lorediff_external_base_url" style="min-width: 180px;">API Base URL</label>
          <input id="lorediff_external_base_url" type="text" class="text_pole" placeholder="http://127.0.0.1:1234/v1" />
        </div>

        <div class="flex-container flexGap10 alignItemsCenter">
          <label for="lorediff_external_api_key" style="min-width: 180px;">API Key</label>
          <input id="lorediff_external_api_key" type="password" class="text_pole" placeholder="sk-..." />
        </div>

        <div class="flex-container flexGap10 alignItemsCenter">
          <label for="lorediff_external_model" style="min-width: 180px;">Model</label>
          <input id="lorediff_external_model" type="text" class="text_pole" placeholder="qwen3:4b" />
        </div>

        <div class="flex-container flexGap10 alignItemsCenter">
          <label for="lorediff_external_temperature" style="min-width: 180px;">Temperature</label>
          <input id="lorediff_external_temperature" type="number" min="0" max="2" step="0.05" />
        </div>
      </div>

      <div class="flex-container flexGap10 alignItemsCenter">
        <label for="lorediff_max_messages" style="min-width: 180px;">Recent messages</label>
        <input id="lorediff_max_messages" type="number" min="5" max="200" step="1" />
      </div>

      <div class="flex-container flexGap10 alignItemsCenter">
        <label for="lorediff_baseline_book" style="min-width: 180px;">Baseline lorebook</label>
        <select id="lorediff_baseline_book"></select>
      </div>

      <div class="flex-container flexGap10 alignItemsCenter">
        <label for="lorediff_max_chars" style="min-width: 180px;">Analysis budget (chars)</label>
        <input id="lorediff_max_chars" type="number" min="1000" max="100000" step="500" />
      </div>

      <div class="flex-container flexGap10 alignItemsCenter">
        <label for="lorediff_max_tokens" style="min-width: 180px;">Max tokens</label>
        <input id="lorediff_max_tokens" type="number" min="64" max="4096" step="16" />
      </div>

      <div class="flex-container flexGap10 alignItemsCenter">
        <label for="lorediff_json_mode" style="min-width: 180px;">JSON parsing</label>
        <select id="lorediff_json_mode">
          <option value="tolerant">Tolerant (extract JSON)</option>
          <option value="strict">Strict (JSON only)</option>
        </select>
      </div>

      <hr />

      <div class="flex-container flexGap10 alignItemsCenter">
        <label for="lorediff_prompt_profile" style="min-width: 180px;">Prompt profile</label>
        <select id="lorediff_prompt_profile"></select>
        <button class="menu_button" id="lorediff_prompt_new" title="New prompt profile">+</button>
        <button class="menu_button" id="lorediff_prompt_duplicate" title="Duplicate prompt profile">⧉</button>
        <button class="menu_button" id="lorediff_prompt_delete" title="Delete prompt profile">🗑</button>
      </div>

      <div class="flex-container flexGap10 alignItemsCenter">
        <label for="lorediff_prompt_profile_name" style="min-width: 180px;">Profile name</label>
        <input id="lorediff_prompt_profile_name" type="text" class="text_pole" />
      </div>

      <div class="flex-container flexGap10" style="flex-direction: column;">
        <label for="lorediff_prompt_template">Prompt template (use {{stateLore}} and {{chatSnippet}})</label>
        <textarea id="lorediff_prompt_template" class="text_pole textarea_compact" rows="10"></textarea>
      </div>

      <hr />

      <div class="flex-container flexGap10 alignItemsCenter">
        <button class="menu_button" id="lorediff_run_btn">Detect STATE changes</button>
      </div>

      <div id="lorediff_results" class="wide100p"></div>
    </div>
  </div>
</div>
