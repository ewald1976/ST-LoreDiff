<div id="lorediff_modal_root">
  <div class="flex-container flexGap10 alignitemscenter justifyspacebetween">
    <div>
      <div class="lorediff_modal_title">LoreDiff – <span id="lorediff_modal_lorebook"></span></div>
      <div class="lorediff_modal_subtitle">Messages: <span id="lorediff_modal_range"></span></div>
    </div>
    <div class="flex-container flexGap10 alignitemscenter">
      <button class="menu_button" id="lorediff_modal_close">Close</button>
    </div>
  </div>

  <hr />

  <div class="lorediff_modal_section">
    <div class="lorediff_modal_section_title">Input</div>
    <div class="lorediff_modal_hint">Optional summary to help smaller models. Leave empty if not needed.</div>
    <textarea id="lorediff_modal_summary" class="text_pole textarea_compact" rows="4" placeholder="(optional) scene summary..."></textarea>
  </div>

  <hr />

  <div class="lorediff_modal_section">
    <div class="flex-container flexGap10 alignitemscenter justifyspacebetween">
      <div class="lorediff_modal_section_title">Story State</div>
      <div class="flex-container flexGap10 alignitemscenter">
        <select id="lorediff_modal_story_profile" class="text_pole"></select>
        <button class="menu_button" id="lorediff_modal_story_new" title="New prompt profile">+</button>
        <button class="menu_button" id="lorediff_modal_story_dup" title="Duplicate prompt profile">⧉</button>
        <button class="menu_button" id="lorediff_modal_story_del" title="Delete prompt profile">🗑</button>
        <button class="menu_button" id="lorediff_modal_story_edit">Edit prompt</button>
        <button class="menu_button" id="lorediff_modal_story_run">Generate</button>
        <button class="menu_button" id="lorediff_modal_story_copy" disabled>Copy</button>
      </div>
    </div>
    <div id="lorediff_modal_story_out" class="lorediff_modal_block">No result yet.</div>
  </div>

  <hr />

  <div class="lorediff_modal_section">
    <div class="flex-container flexGap10 alignitemscenter justifyspacebetween">
      <div class="lorediff_modal_section_title">Scene State</div>
      <div class="flex-container flexGap10 alignitemscenter">
        <select id="lorediff_modal_scene_profile" class="text_pole"></select>
        <button class="menu_button" id="lorediff_modal_scene_new" title="New prompt profile">+</button>
        <button class="menu_button" id="lorediff_modal_scene_dup" title="Duplicate prompt profile">⧉</button>
        <button class="menu_button" id="lorediff_modal_scene_del" title="Delete prompt profile">🗑</button>
        <button class="menu_button" id="lorediff_modal_scene_edit">Edit prompt</button>
        <button class="menu_button" id="lorediff_modal_scene_run">Generate</button>
        <button class="menu_button" id="lorediff_modal_scene_copy" disabled>Copy</button>
      </div>
    </div>
    <div id="lorediff_modal_scene_out" class="lorediff_modal_block">No result yet.</div>
  </div>

  <hr />

  <div class="flex-container flexGap10 alignitemscenter justifyspacebetween">
    <button class="menu_button" id="lorediff_modal_settings">Settings</button>
    <button class="menu_button" id="lorediff_modal_ok">OK</button>
  </div>
</div>
