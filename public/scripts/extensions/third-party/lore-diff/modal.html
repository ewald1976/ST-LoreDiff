<div id="lorediff_modal_root">
  <div class="flex-container flexGap10 alignitemscenter justifyspacebetween">
    <div>
      <div class="lorediff_modal_title">LoreDiff – <span id="lorediff_modal_lorebook"></span></div>
      <div class="lorediff_modal_subtitle">Messages: <span id="lorediff_modal_range"></span></div>
    </div>
    <div class="flex-container flexGap10 alignitemscenter">
      <button class="menu_button" id="lorediff_modal_copy">Copy to Clipboard</button>
      <button class="menu_button" id="lorediff_modal_close">Close</button>
    </div>
  </div>

  <hr />

  <div class="lorediff_modal_section">
    <div class="flex-container flexGap10 alignitemscenter justifyspacebetween">
      <div class="lorediff_modal_section_title">Detect Changes</div>
      <button class="menu_button" id="lorediff_modal_detect">Detect Changes</button>
    </div>
    <div id="lorediff_modal_results" class="lorediff_modal_block">No result yet.</div>
  </div>

  <hr />

  <div class="lorediff_modal_section">
    <div class="flex-container flexGap10 alignitemscenter justifyspacebetween">
      <div class="lorediff_modal_section_title">Lore Suggestion</div>
      <button class="menu_button" id="lorediff_modal_suggest" disabled>Generate Lore Suggestion</button>
    </div>
    <textarea id="lorediff_modal_suggestion" class="text_pole textarea_compact" rows="12" placeholder="[Lorevorschlag]\n\nSTATE\n- ..."></textarea>
  </div>
</div>
